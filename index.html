<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Quiz - Modern Edition</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0; padding: 0;
            background-color: #f3f4f6; /* 연한 회색 배경 */
            color: #333;
        }

        /* 상단 네비게이션 바 */
        .navbar {
            background-color: #ffffff;
            padding: 15px 25px;
            border-bottom: 1px solid #e5e7eb;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { margin: 0; font-size: 1.2rem; color: #111; }
        .nav-links a { color: #666; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }

        /* 메인 컨텐츠 영역 (원본 구성 그대로) */
        .main-container {
            display: flex; flex-wrap: wrap; gap: 20px; padding: 25px;
            max-width: 1200px; margin: 0 auto;
        }

        /* 왼쪽 설정창 */
        .setup-panel {
            flex: 1; min-width: 300px;
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .setup-panel h2 { font-size: 1rem; margin-top: 0; border-bottom: 2px solid #6366f1; padding-bottom: 8px; display: inline-block; }

        /* 오른쪽 퀴즈창 */
        .quiz-panel {
            flex: 2; min-width: 400px;
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            min-height: 500px;
        }

        textarea {
            width: 100%; height: 200px; margin: 10px 0;
            border: 1px solid #d1d5db; border-radius: 10px; padding: 12px;
            font-family: 'Courier New', monospace; font-size: 0.85rem; outline: none;
        }
        textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            padding: 12px; border: none; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-primary { background-color: #6366f1; color: white; }
        .btn-secondary { background-color: #e5e7eb; color: #374151; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 퀴즈 문항 디자인 */
        .quiz-card { border: 1px solid #f0f0f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .question-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; }
        .choice-list { list-style: none; padding: 0; }
        .choice-item { 
            padding: 12px 15px; border: 1px solid #e5e7eb; border-radius: 8px; 
            margin-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .choice-item:hover { background-color: #f8fafc; border-color: #6366f1; }
        
        .answer-input { 
            width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; 
            margin-bottom: 10px; font-size: 1rem;
        }

        .explanation { 
            background: #fdf2f2; color: #9b1c1c; padding: 12px; 
            border-radius: 8px; margin-top: 10px; display: none; font-size: 0.9rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>JSON Quiz Maker</h1>
    <div class="nav-links">
        <a href="#">Setup</a>
        <a href="#">About</a>
    </div>
</nav>

<div class="main-container">
    <div class="setup-panel">
        <h2>Settings</h2>
        <textarea id="jsonInput" placeholder='JSON 데이터를 여기에 입력하세요...'></textarea>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="loadQuiz()">퀴즈 불러오기</button>
            <button class="btn btn-secondary" onclick="saveToLocal()">현재 세트 저장</button>
        </div>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">* 로컬스토리지에 자동 저장됩니다.</p>
    </div>

    <div class="quiz-panel" id="quizDisplay">
        <div style="color: #bbb; text-align: center; margin-top: 100px;">
            왼쪽에서 JSON을 입력하고 <br> [퀴즈 불러오기]를 눌러주세요.
        </div>
    </div>
</div>

<script>
    let currentData = [];

    // 페이지 로드 시 저장된 데이터 불러오기
    window.onload = () => {
        const saved = localStorage.getItem('user_quiz_json');
        if(saved) {
            document.getElementById('jsonInput').value = saved;
            loadQuiz();
        }
    };

    function loadQuiz() {
        const input = document.getElementById('jsonInput').value;
        try {
            currentData = JSON.parse(input);
            renderQuiz();
        } catch(e) {
            alert("JSON 형식이 맞지 않습니다!");
        }
    }

    function saveToLocal() {
        const input = document.getElementById('jsonInput').value;
        localStorage.setItem('user_quiz_json', input);
        alert("저장되었습니다! 💾");
    }

    function renderQuiz() {
        const display = document.getElementById('quizDisplay');
        display.innerHTML = '';

        currentData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            
            let html = `<div class="question-text">${idx + 1}. ${q.question}</div>`;

            if(q.type === 'multiple') {
                html += `<div class="choice-list">`;
                q.choices.forEach((c, cIdx) => {
                    html += `<div class="choice-item" onclick="checkAnswer(${idx}, ${cIdx})">${c}</div>`;
                });
                html += `</div>`;
            } else {
                html += `<input type="text" class="answer-input" placeholder="답을 입력하고 Enter" onkeypress="if(event.keyCode==13) checkAnswer(${idx}, this.value)">`;
            }

            html += `<div id="exp-${idx}" class="explanation"><strong>해설:</strong> ${q.explanation}</div>`;
            card.innerHTML = html;
            display.appendChild(card);
        });
    }

    function checkAnswer(idx, userAns) {
        const q = currentData[idx];
        const isCorrect = (q.type === 'multiple') ? (userAns === q.answer) : (userAns.trim() === q.answer.toString().trim());
        
        if(isCorrect) alert("정답입니다! 🎉");
        else alert("틀렸습니다! ✍️");
        
        document.getElementById(`exp-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
