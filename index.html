<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Quiz ✨</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --secondary: #94a3b8;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary);
            text-align: center;
        }

        .quiz-item {
            margin-bottom: 2rem;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 1.5rem;
        }

        .question {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 1rem;
            font-family: inherit;
        }

        button:hover {
            background-color: #f1f5f9;
            border-color: var(--primary);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
        }

        .explanation {
            margin-top: 10px;
            padding: 10px;
            background: #eef2ff;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--primary);
            display: none; /* 정답 확인 시 보여줄 용도 */
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧪 Chemistry Quiz</h1>
    <div id="quiz-container">
        </div>
</div>

<script>
    const quizData = [
      {
        "type": "multiple",
        "question": "Chemical reactions occur as a result of ______.",
        "choices": ["the attraction between opposite charges","the nucleus-nucleus interactions","the motion of electrons","like atoms interacting"],
        "answer": 2,
        "explanation": "화학반응은 전자의 이동/공유에 의해 발생합니다."
      },
      {
        "type": "short",
        "question": "What is the chemical formula for water?",
        "answer": "H2O",
        "explanation": "수소 2개 + 산소 1개로 구성됩니다."
      },
      {
        "type": "essay",
        "question": "공유결합과 이온결합의 차이를 설명하시오.",
        "answer": "공유결합은 전자쌍을 공유, 이온결합은 전자를 주고받아 형성",
        "explanation": "전기음성도 차이가 크면 이온결합, 작으면 공유결합이 우세합니다."
      }
    ];

    const container = document.getElementById('quiz-container');

    quizData.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'quiz-item';
        
        let html = `<div class="question">${index + 1}. ${item.question}</div>`;
        
        if (item.type === 'multiple') {
            html += `<div class="choices">`;
            item.choices.forEach((choice, i) => {
                html += `<button onclick="check(${index}, ${i})">${choice}</button>`;
            });
            html += `</div>`;
        } else if (item.type === 'short') {
            html += `<input type="text" placeholder="정답을 입력하세요" onchange="showExp(${index})">`;
        } else {
            html += `<textarea rows="3" placeholder="답변을 작성하세요" onchange="showExp(${index})"></textarea>`;
        }
        
        html += `<div id="exp-${index}" class="explanation">💡 해설: ${item.explanation}</div>`;
        div.innerHTML = html;
        container.appendChild(div);
    });

    function showExp(index) {
        document.getElementById(`exp-${index}`).style.display = 'block';
    }

    function check(quizIdx, choiceIdx) {
        const correct = quizData[quizIdx].answer;
        if(choiceIdx === correct) alert("정답입니다! 🎉");
        else alert("다시 생각해보세요! ✍️");
        showExp(quizIdx);
    }
</script>

</body>
</html>
