<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart JSON Quiz Maker ✨</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 2rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; color: var(--primary); text-align: center; margin-bottom: 2rem; }
        
        /* 설정 영역 */
        .setup-section { background: #f1f5f9; padding: 1.5rem; border-radius: 16px; margin-bottom: 2rem; }
        textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; margin-top: 10px; font-family: monospace; box-sizing: border-box; }
        
        /* 퀴즈 아이템 */
        .quiz-item { background: #fff; border: 1px solid #e2e8f0; padding: 1.5rem; border-radius: 16px; margin-bottom: 1rem; transition: transform 0.2s; }
        .quiz-item:hover { transform: translateY(-2px); border-color: var(--primary); }
        .question { font-weight: 600; margin-bottom: 1rem; }
        
        /* 버튼 스타일 */
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.2s; margin-top: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #e2e8f0; color: var(--text); }
        .btn:hover { opacity: 0.9; }
        
        .choice-btn { display: block; width: 100%; text-align: left; padding: 10px; margin: 5px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: white; cursor: pointer; }
        .choice-btn:hover { background: #f8fafc; border-color: var(--primary); }
        
        .exp { margin-top: 10px; padding: 10px; background: #eef2ff; border-radius: 8px; color: var(--primary); font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧪 Smart Quiz Maker</h1>

    <div class="setup-section">
        <label><strong>JSON 데이터 입력</strong></label>
        <textarea id="jsonInput" rows="5" placeholder='[{ "type": "multiple", "question": "질문", ... }]'></textarea>
        <button class="btn btn-primary" onclick="loadJSON()">데이터 불러오기 / 시작하기</button>
        <button class="btn btn-secondary" style="margin-top: 10px;" onclick="saveToLocal()">현재 세트 내 브라우저에 저장</button>
    </div>

    <div id="quiz-display"></div>
</div>

<script>
    let quizzes = [];

    // 로컬 스토리지에서 기존 데이터 불러오기
    window.onload = () => {
        const saved = localStorage.getItem('my-quiz-set');
        if (saved) {
            document.getElementById('jsonInput').value = saved;
            loadJSON();
        }
    };

    function loadJSON() {
        try {
            const input = document.getElementById('jsonInput').value;
            quizzes = JSON.parse(input);
            renderQuizzes();
        } catch (e) {
            alert("JSON 형식이 올바르지 않습니다! 다시 확인해주세요.");
        }
    }

    function saveToLocal() {
        const input = document.getElementById('jsonInput').value;
        localStorage.setItem('my-quiz-set', input);
        alert("브라우저에 저장되었습니다! 💾");
    }

    function renderQuizzes() {
        const display = document.getElementById('quiz-display');
        display.innerHTML = '';

        quizzes.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'quiz-item';
            let content = `<div class="question">${i+1}. ${q.question}</div>`;

            if (q.type === 'multiple') {
                q.choices.forEach((c, cIdx) => {
                    content += `<button class="choice-btn" onclick="checkAnswer(${i}, ${cIdx})">${c}</button>`;
                });
            } else {
                content += `<input type="text" id="ans-${i}" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;" placeholder="답을 입력하고 엔터" onkeypress="if(event.keyCode==13) checkAnswer(${i}, this.value)">`;
            }

            content += `<div id="exp-${i}" class="exp">💡 해설: ${q.explanation}</div>`;
            div.innerHTML = content;
            display.appendChild(div);
        });
    }

    function checkAnswer(idx, userAns) {
        const q = quizzes[idx];
        const isCorrect = (q.type === 'multiple') ? (userAns === q.answer) : (userAns.trim() === q.answer.toString().trim());
        
        alert(isCorrect ? "정답입니다! 🎉" : "틀렸습니다. 다시 풀어보세요! ✍️");
        document.getElementById(`exp-${idx}`).style.display = 'block';
    }
</script>

</body>
</html>
